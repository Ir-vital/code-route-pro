name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend ──────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint, Type-check, Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: coderoute
          POSTGRES_PASSWORD: coderoute_secret
          POSTGRES_DB: coderoute_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U coderoute"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv==0.5.11

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (Ruff)
        run: uv run ruff check app/ tests/

      - name: Format check (Ruff)
        run: uv run ruff format --check app/ tests/

      - name: Type check (mypy)
        run: uv run mypy app/ --ignore-missing-imports
        continue-on-error: true  # Non-bloquant pour l'instant

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://coderoute:coderoute_secret@localhost:5432/coderoute_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only
          ENV: development
          DEBUG: "true"
        run: |
          uv run pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint, Type-check, Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  # ─── Docker build (smoke test) ────────────────────────────────────────────
  docker:
    name: Docker — Build smoke test
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: coderoute-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: coderoute-frontend:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max
